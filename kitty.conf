# FUENTE
font_family JetBrains Mono
font_size 15.0
bold_font auto
italic_font auto

# FONDO COZY ROSA
background #1e1b2e
foreground #f8e1f4

# Rosa suave como base visual
selection_background #f5c2e7
selection_foreground #1e1b2e

# CURSOR
cursor #f5c2e7
cursor_text_color #1e1b2e
cursor_shape block

# TRANSPARENCIA SUAVE
background_opacity 0.92

# SCROLL
scrollback_lines 10000

# SIN BEEP
enable_audio_bell no

# COLORES (PASTEL)
color0  #45475a
color1  #f38ba8  
color2  #a6e3a1  
color3  #f9e2af 
color4  #89b4fa 
color5  #f5c2e7 
color6  #94e2d5 
color7  #bac2de

color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #ffffff

# TABS
tab_bar_edge bottom
active_tab_background   #f5c2e7
active_tab_foreground   #1e1b2e
inactive_tab_background #313244
inactive_tab_foreground #cdd6f4

# KEYBINDS
map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+s launch --location=vsplit
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
map ctrl+k neighboring_window up
map ctrl+j neighboring_window down

# NUEVA VENTANA EN MISMO DIRECTORIO
map ctrl+enter new_window_with_cwd
